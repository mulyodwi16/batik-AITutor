# Nginx config untuk Tailscale Funnel
# Tailscale tunnel dari :443 (HTTPS) ke app lokal Gunicorn:8000

server {
    # Tailscale Funnel provide HTTPS on port 443
    # Listen on localhost:8080 lokal, Tailscale handle HTTPS tunnel
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10m;

    # Serve static assets directly via Nginx
    location /static/ {
        alias /var/www/batik-ai-tutor/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Reverse proxy ke Gunicorn app (port 8000)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }

    # API chat endpoint dengan timeout lebih panjang
    location /api/chat {
        proxy_pass http://127.0.0.1:8000/api/chat;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM calls bisa slow, kasih 300s timeout
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
    }

    # Health check endpoint
    location /api/health {
        proxy_pass http://127.0.0.1:8000/api/health;
        proxy_http_version 1.1;

        proxy_read_timeout 30;
    }
}
