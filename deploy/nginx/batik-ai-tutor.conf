server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Serve static assets directly via Nginx
    location /static/ {
        alias /var/www/batik-ai-tutor/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Reverse proxy to Flask/Gunicorn app
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }

    # Optional: stricter endpoint-specific control for chat API
    location /api/chat {
        proxy_pass http://127.0.0.1:8000/api/chat;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout because LLM responses can be slow
        proxy_read_timeout 300;
    }
}
